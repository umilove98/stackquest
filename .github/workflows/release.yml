name: release

# Push a version tag (e.g. v0.6.0) and this builds the Windows exe and publishes
# a GitHub Release with it. `stackquest --update` then finds it automatically.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Selftest gate
        run: node game.js --selftest

      - name: Build Windows exe (stable filename so self-update keeps the name)
        run: |
          mkdir -p dist
          bun build ./game.js --compile --target=bun-windows-x64 --outfile dist/stackquest.exe

      - name: Checksum + release notes
        run: |
          cd dist && sha256sum stackquest.exe > stackquest.exe.sha256 && cd ..
          node tools/notes.mjs "${GITHUB_REF_NAME}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: NOTES.md
          files: |
            dist/stackquest.exe
            dist/stackquest.exe.sha256
